<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Форма выбора питомца</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<main>
    <h1>Найди себе друга!</h1>

    <form action="/pets/orders" method="POST">
        <label>
            Ваше имя
            <input type="text" name="userName" placeholder="Введите имя">
        </label>

        <label>
            Email
            <input type="email" name="email" required placeholder="enter email">
        </label> <br>

        <label>
            Выберите животное
            <select name="favouritePet">
                <option value="cat" selected>Котик</option>
                <option value="dog">Собачка</option>
                <option value="rodion">Родион</option>
            </select>
        </label>
    </form>

    <button type="submit">Отправить</button>
    <button type="reset">Сбросить значения</button>


</main>
</body>
</html>
